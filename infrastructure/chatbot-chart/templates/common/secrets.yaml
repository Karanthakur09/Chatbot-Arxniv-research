apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
type: Opaque
stringData:
  # R2 Credentials
  R2_ACCESS_KEY: "{{ .Values.r2.accessKey }}"
  R2_SECRET_KEY: "{{ .Values.r2.secretKey }}"
  
  # Langfuse Credentials
  LANGFUSE_SECRET_KEY: "{{ .Values.langfuse.secretKey }}"
  LANGFUSE_PUBLIC_KEY: "{{ .Values.langfuse.publicKey }}"
  
  # API Keys
  GEMINI_API_KEY: "{{ .Values.gemini.apiKey }}"
  OPENROUTER_API_KEY: "{{ .Values.openrouter.apiKey }}"

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.snowflake }}
type: Opaque
stringData:
  SNOWFLAKE_USER: "{{ .Values.snowflake.user }}"
  SNOWFLAKE_PASSWORD: "{{ .Values.snowflake.password }}"
  SNOWFLAKE_ACCOUNT: "{{ .Values.snowflake.account }}"
  SNOWFLAKE_WAREHOUSE: "{{ .Values.snowflake.warehouse }}"
  SNOWFLAKE_DATABASE: "{{ .Values.snowflake.database }}"
  SNOWFLAKE_SCHEMA: "{{ .Values.snowflake.schema }}"
