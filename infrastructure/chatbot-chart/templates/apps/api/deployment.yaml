{% comment %} apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: chatbot-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      dnsPolicy: "ClusterFirst"
      dnsConfig:
        nameservers:
          - 8.8.8.8
        searches:
          - chatbot-ai.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        options:
          - name: ndots
            value: "5"
      containers:
        - name: api
          image: your-dockerhub/enterprise-ai:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - secretRef:
                name: snowflake-secret
            - configMapRef:
                name: app-config {% endcomment %}


apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chatbot-ai.fullname" . }}-api
  labels:
    app: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      dnsPolicy: {{ .Values.dns.policy | quote }}
      dnsConfig:
        nameservers:
          {{- toYaml .Values.dns.nameservers | nindent 10 }}
        searches:
          {{- toYaml .Values.dns.searches | nindent 10 }}
        options:
          - name: ndots
            value: "5"
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8000
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.snowflake }}
            - configMapRef:
                name: {{ .Values.configMaps.appConfig }}
                