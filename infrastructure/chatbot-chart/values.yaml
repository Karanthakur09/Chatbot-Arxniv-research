replicaCount: 1

image:
  repository: registry.digitalocean.com/enterprise-ai-registry/enterprise-ai
  tag: latest
  pullPolicy: Always

imagePullSecrets:
  - name: registry-enterprise-ai-registry   # ✅ FIXED

# ---------------- DNS ----------------
dns:
  policy: ClusterFirst
  nameservers:
    - 8.8.8.8
    - 8.8.4.4
  searches:
    - default.svc.cluster.local
    - svc.cluster.local

# ---------------- SERVICE ----------------
service:
  type: ClusterIP
  port: 8000

# ---------------- API ----------------
api:
  replicaCount: 2

  image:
    repository: registry.digitalocean.com/enterprise-ai-registry/enterprise-ai
    tag: latest
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8000

  ingress:
    host: ""

  hpa:
    enabled: false

  probes:
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 10
    readiness:
      initialDelaySeconds: 20
      periodSeconds: 10

  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

# ---------------- WORKER ----------------
worker:
  replicaCount: 1

  image:
    repository: registry.digitalocean.com/enterprise-ai-registry/enterprise-ai
    tag: latest
    pullPolicy: Always

  command: ["python", "-m", "services.workers.snowflake_consumer"]

  probes:
    liveness:
      initialDelaySeconds: 30
      periodSeconds: 10

  resources:
    requests:
      cpu: "300m"
      memory: "512Mi"
    limits:
      cpu: "700m"
      memory: "1Gi"

# ---------------- STORAGE ----------------
storage:
  qdrant:
    accessModes:
      - ReadWriteOnce
    size: 5Gi

  kafka:
    accessModes:
      - ReadWriteOnce
    size: 5Gi

# ---------------- INFRA ----------------
kafka:
  replicaCount: 1
  replicationFactor: "1"

  image:
    repository: apache/kafka
    tag: latest

  persistence:
    size: 5Gi
    accessModes:
      - ReadWriteOnce

qdrant:
  replicaCount: 1
  image:
    repository: qdrant/qdrant
    tag: latest

redis:
  replicaCount: 1
  image:
    repository: redis
    tag: "7"

# ---------------- AUTOSCALING ----------------
autoscaling:
  enabled: false

