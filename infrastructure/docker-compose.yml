version: "3.8"

services:
  # --- Infrastructure ---
  redis:
    image: redis:7
    container_name: enterprise-redis
    restart: always
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    container_name: enterprise-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage

  kafka:
    image: apache/kafka:latest
    container_name: enterprise-kafka
    restart: always
    ports:
      - "9092:9092"
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1

  # --- Your Python API ---
  api:
    build:
      context: ..              # Look at the root folder for code
      dockerfile: infrastructure/Dockerfile
    container_name: enterprise-api
    volumes:
      - ..:/app
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - kafka
      - redis
      - qdrant
    # The CMD in Dockerfile runs uvicorn by default
    command: uvicorn services.api_gateway.main:app --host 0.0.0.0 --port 8000 --reload

  # --- Your Snowflake Worker ---
  worker:
    build:
      context: ..              # Look at the root folder for code
      dockerfile: infrastructure/Dockerfile
    container_name: enterprise-worker
    volumes:
      - ..:/app
    restart: always
    depends_on:
      - kafka
    # This overrides the default CMD to run your worker instead
    command: python -m services.workers.snowflake_consumer
