version: "3.8"

services:

  redis:
    image: redis:7
    container_name: enterprise-redis
    restart: always
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant
    container_name: enterprise-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage